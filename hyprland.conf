# --- Autostart ---
exec-once = waybar
exec-once = swaybg -i /home/milkaa/wallpaper/moun.jpeg

monitor = , preferred, auto, 1.25


input {
    kb_layout = fr
    numlock_by_default = true
}

decoration {
    rounding = 5
    active_opacity = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        xray = false
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ffffffff)
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

# --- Keybinds ---

# Fullscreen
bind = SUPER, F, fullscreen, 1

# Navigation with numeric keypad 0
bind = , KP_Insert, cyclenext
bind = , KP_Insert, fullscreen, 1

# Launch app
bind = SUPER, A, exec, radial-menu
bind = SUPER, R, exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi -kb-cancel "r,Escape"
bind = SUPER, Q, exec, kitty
bind = SUPER, C, killactive
